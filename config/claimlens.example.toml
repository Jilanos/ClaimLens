[paths]
database = "data/claimlens.sqlite3"
outputs = "outputs"
transcripts = "outputs/transcripts"
briefs = "outputs/briefs"

[pipeline]
max_videos_per_channel = 10
candidate_min_duration_seconds = 480
source_verification_max_results = 5
source_verification_timeout_seconds = 20
analysis_max_chars = 60000
report_language = "en"

[web]
max_request_bytes = 16384
rate_limit_actions = 12
rate_limit_window_seconds = 300
public_base_url = ""
secure_cookies = false
registration_enabled = false
allow_server_api_key_fallback = true

[sources]
advanced_source_verification = false
enable_pubmed = true
enable_semantic_scholar = true
enable_web_search = false
